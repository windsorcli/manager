$schema: https://json-schema.org/draft/2020-12/schema
title: Windsor Manager Blueprint Configuration Schema
description: Schema for configuring Windsor platform blueprints
type: object

$defs:
  # DNS-1123 label: lowercase alphanumerics and hyphens, starts/ends alphanumeric, 1-63 chars.
  dnsLabel:
    type: string
    pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
  # Multi-label DNS hostname: one or more dnsLabels joined by dots.
  dnsHostname:
    type: string
    pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*$'
  # Strict IPv4 dotted-quad, each octet 0-255.
  ipv4:
    type: string
    pattern: '^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$'
  # POSIX absolute path.
  posixPath:
    type: string
    pattern: '^/[A-Za-z0-9._/\-]+$'
  # POSIX absolute path with optional `:<dest-path>` suffix (Docker-style bind mount).
  bindMountPath:
    type: string
    pattern: '^/[A-Za-z0-9._/\-]+(:/[A-Za-z0-9._/\-]+)?$'
  # http or https URL.
  httpUrl:
    type: string
    pattern: '^https?://\S+$'
  # RFC 4122 UUID (8-4-4-4-12 hex).
  uuid:
    type: string
    pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
  # Kubernetes label/taint key: optional `<dns-subdomain>/` prefix plus name.
  k8sLabelKey:
    type: string
    pattern: '^(([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*)/)?[A-Za-z0-9]([A-Za-z0-9._-]{0,61}[A-Za-z0-9])?$'
  # Kubernetes label/taint value: bounded alphanumeric or empty.
  k8sLabelValue:
    type: string
    pattern: '^([A-Za-z0-9]([A-Za-z0-9._-]{0,61}[A-Za-z0-9])?)?$'
  diskItem: &diskItem
    type: object
    properties:
      name:
        $ref: '#/$defs/dnsLabel'
        description: Disk name; used as the UserVolumeConfig name and mount point (/var/mnt/<name>) on Talos.
      size:
        type: integer
        minimum: 1
        description: Disk size in GB. Required on provisioned platforms (Incus, cloud) to create the volume. Optional on metal when selector is set.
      selector:
        type: string
        description: >
          CEL expression passed directly to Talos diskSelector.match (e.g. "disk.serial == 'WD-ABC123'",
          "disk.wwid == '...'", "disk.bus_path == '0*:0:0:0'"). Takes precedence over size-based
          post-boot discovery. Set per-node when disks differ between machines.
      type:
        type: string
        description: Disk type (platform-specific; e.g. cloud disk type or "default")
      path:
        $ref: '#/$defs/posixPath'
        description: Mount point inside instance (e.g. /mnt/data, /var/mnt/local). Optional for block storage when device is set.
      source:
        type: string
        description: Source path for bind mounts or volume name
      device:
        type: string
        anyOf:
          - pattern: '^/dev/[A-Za-z0-9._/\-]+$'
          - pattern: '^[a-z][a-z0-9+\-.]*://\S+$'
        description: Block device path or URI for block storage. `/dev/<name>` for local block devices (e.g. /dev/sdb or /dev/disk/by-id/<id>); URI for cloud/remote block storage. Used for node storage pools; platform may still attach by size/type.
      read_only:
        type: boolean
        default: false
        description: Mount as read-only
    required:
      - name
  nodesSchema: &nodesSchema
    type: object
    propertyNames:
      $ref: '#/$defs/dnsLabel'
    additionalProperties:
      type: object
      properties:
        endpoint:
          type: string
          pattern: '^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(:([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5]))?$'
          description: Node endpoint as IPv4 dotted-quad, with an optional `:port` suffix in the 1-65535 TCP range (typically Talos apid on 50000 or the NodePort-mode forward like 40000-40199). Facets split host:port on `:`, so IPv6 is not supported here.
        hostname:
          $ref: '#/$defs/dnsHostname'
          description: Node hostname. Lowercase DNS-labels separated by dots (RFC 1123); single-label like `controlplane-1` or multi-label like `controlplane-1.cluster.local`.
        node:
          type: string
          anyOf:
            - $ref: '#/$defs/ipv4'
            - $ref: '#/$defs/dnsHostname'
          description: Node identifier — IPv4 dotted-quad (typical for static-node providers) or a DNS-labelled hostname. Used by talosctl and downstream facets to address the machine.
        image:
          type: string
          description: Node image. Overrides pool-level image when set.
        disks:
          type: array
          items: *diskItem
          description: Data disks for this node only. Overrides pool-level disks for this node (no merge).
        volumes:
          type: array
          items:
            $ref: '#/$defs/bindMountPath'
          description: Reserved; only pool-level volumes (controlplanes.volumes / workers.volumes) are used today for extraMounts and compute bind mounts.
      required:
        - endpoint
        - node
    description: Named node configurations. Keys must be DNS-1123 labels (lowercase alphanumerics and hyphens, starting and ending with alphanumeric, max 63 chars) since they flow downstream as kubelet hostnames.
  nodePool: &nodePool
    count:
      type: integer
      minimum: 0
      description: Number of nodes (workers may be 0 for single-node clusters; controlplanes need at least 1).
    image:
      type: string
      description: Node image for this pool. Per-node image overrides when set.
    instance_type:
      type: string
      description: Cloud provider instance type
    cpu:
      type: integer
      minimum: 1
      default: 4
      description: CPU cores per node. Default 4 applies to both controlplane and worker pools.
    memory:
      type: integer
      minimum: 1
      default: 8
      description: Memory in GB per node. Default 8 applies to both controlplane and worker pools.
    root_disk_size:
      type: integer
      minimum: 1
      description: Root/OS disk size in GB
    disks:
      type: array
      items: *diskItem
      description: Additional data disks (pool-level). Platform attach and/or block storage.
    hostports:
      type: array
      items:
        type: string
        pattern: "^[0-9]+:[0-9]+/(tcp|udp)$"
      description: Host port mappings (format "host:container/protocol")
    nodes: *nodesSchema
    volumes:
      type: array
      items:
        $ref: '#/$defs/bindMountPath'
      description: Node directory paths for extra mounts. For directory-based storage include cluster.storage.local_base_path. Block/device storage uses disks instead.

properties:
  # Context identity (from windsor.yaml or values)
  id:
    $ref: '#/$defs/dnsLabel'
    description: Context id (short identifier for this deployment). Flows into cluster names, terraform workspace names, and other downstream identifiers that require a DNS-1123 label.

  # Infrastructure platform — canonical key that selects the platform facet.
  platform:
    type: string
    enum:
      - none
      - aws
      - azure
      - incus
      - metal
      - docker
      - hyperv
    default: none
    description: Infrastructure platform. Selects the platform facet (cluster driver defaults, policy, PKI, telemetry, ingress, storage).

  # Development mode
  dev:
    type: boolean
    default: false
    description: Enable development mode with additional observability and debugging tools

  # Lifecycle posture
  ephemeral:
    type: boolean
    default: false
    description: Whether infrastructure is short-lived. True relaxes destroy-time guards and ownership choices for stacks that recreate routinely (CI, integration testing).

  # Secret provider configuration for secret() references in this context's values.
  secrets:
    type: object
    properties:
      onepassword:
        type: object
        properties:
          vaults:
            type: object
            description: Map of vault alias (the first argument to secret()) to its connection config.
            additionalProperties:
              type: object
              properties:
                id:
                  type: string
                url:
                  type: string
                name:
                  type: string
              additionalProperties: false
        additionalProperties: false
    additionalProperties: false
    description: Secret providers backing secret("vault", "item", "field") references in values.

  # AWS provider configuration (only consumed when platform == 'aws').
  aws:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: Enable AWS integration
      profile:
        type: string
        pattern: '^[A-Za-z0-9_+=,.@\-]+$'
        description: AWS CLI profile to use for authentication. Defaults to the context name when unset, so `aws configure sso` inside the context auto-wires a usable profile. AWS profile-name character set (alphanumerics plus `_+=,.@-`).
      region:
        type: string
        pattern: '^[a-z]{2,3}(-[a-z]+)+-\d+$'
        description: AWS region for API calls. Surfaced as AWS_REGION to every tool run inside the context. Covers all AWS partition formats — commercial (us-west-2, eu-central-1), GovCloud (us-gov-west-1), China (cn-north-1), and ISO (us-iso-east-1).
      endpoint_url:
        $ref: '#/$defs/httpUrl'
        description: Custom endpoint URL for AWS services (e.g. LocalStack testing). http or https URL.
      s3_hostname:
        $ref: '#/$defs/dnsHostname'
        description: Custom hostname for the S3 service. Lowercase DNS-labels separated by dots; no scheme, port, or trailing dot.
      mwaa_endpoint:
        $ref: '#/$defs/httpUrl'
        description: Endpoint for Managed Workflows for Apache Airflow. http or https URL.
    description: AWS provider authentication and endpoint configuration

  # Azure provider configuration. Azure integration activates whenever this block is
  # present or `platform: azure` is set; there is no separate `enabled` flag (mirrors
  # the AWS schema, which also keys on platform/block-presence alone).
  azure:
    type: object
    additionalProperties: false
    properties:
      subscription_id:
        $ref: '#/$defs/uuid'
        description: Azure subscription identifier (UUID, e.g. 00000000-0000-0000-0000-000000000000).
      tenant_id:
        $ref: '#/$defs/uuid'
        description: Azure tenant identifier (UUID, same format as subscription_id).
      environment:
        type: string
        enum:
          - public
          - usgovernment
          - china
          - german
        description: Azure cloud environment. `public` is Azure Public Cloud (default), `usgovernment` is Azure Government, `china` is Azure China 21Vianet, `german` is the deprecated Azure Germany cloud.
      kubelogin_mode:
        type: string
        enum:
          - ""
          - devicecode
          - interactive
          - spn
          - ropc
          - msi
          - azurecli
          - azd
          - workloadidentity
          - azurepipelines
        description: |
          Override the kubelogin login mode used for AAD-enabled AKS clusters.
          Leave empty (default) to let windsor auto-detect from the Azure
          credential chain at apply time: AZURE_FEDERATED_TOKEN_FILE →
          workloadidentity, AZURE_CLIENT_SECRET / AZURE_CLIENT_CERTIFICATE_PATH
          → spn, otherwise azurecli. Set explicitly when the active credential
          is managed identity (msi) or another mode that lacks a process-env
          signal windsor can detect.
    description: Azure provider authentication configuration

  # Hyper-V provider configuration (only consumed when platform == 'hyperv').
  # Connection details (host, credentials, transport) are env-var driven by the
  # provider itself (HYPERV_HOST, HYPERV_USERNAME, etc.); this block carries
  # only the two host-side pointers the facet can't derive — which NIC the
  # virtual switch should bind to, and where on disk to put VHDs/images. The
  # CIDR the cluster lives on (LAN-bridged or NAT-internal) is the
  # platform-agnostic `network.cidr_block`.
  hyperv:
    type: object
    additionalProperties: false
    properties:
      net_adapter:
        type: array
        items:
          type: string
        description: >
          Host NIC(s) the virtual switch binds to. When set, windsor creates
          an External switch (L2-bridged, MetalLB/Cilium L2 reachable on the
          bench LAN). Unset uses Internal (host-only); flipped to NAT
          automatically when gateway.service_type=NodePort.
      base_dir:
        type: string
        pattern: '^[A-Za-z]:[\\/].*$'
        default: "C:/hyperv"
        description: >
          Absolute path on the host. Per-VM VHDXs are written to
          <base_dir>/vhds and parent images to <base_dir>/images. Forward
          and back slashes are accepted equivalently by Hyper-V.
    description: Hyper-V infrastructure configuration

  # Free-form env vars injected by `windsor exec` and into terraform applies.
  # Keyed by env-var name; values are strings (quote numerics in YAML).
  # Useful for provider-side credentials read from env (e.g. HYPERV_*).
  environment:
    type: object
    propertyNames:
      pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
    additionalProperties:
      type: string
    description: Environment variables exported by `windsor exec` and seen by terraform providers. Keys must be valid POSIX-style env-var names (letter or underscore, followed by letters, digits, or underscores) — catches shell-incompatible names like `MY-VAR` or `2VAR` at config-load.

  # Terraform execution config
  terraform:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable Terraform in stacks
      backend:
        type: object
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
              - local
              - s3
              - azurerm
              - kubernetes
              - none
            description: Backend type (local, s3, azurerm, kubernetes, or none)
          prefix:
            type: string
            description: Optional state key/prefix applied per module
          local:
            type: object
            additionalProperties: true
            description: Local backend configuration (https://developer.hashicorp.com/terraform/language/backend/local)
          s3:
            type: object
            additionalProperties: true
            description: S3 backend configuration (https://developer.hashicorp.com/terraform/language/backend/s3)
          kubernetes:
            type: object
            additionalProperties: true
            description: Kubernetes backend configuration (https://developer.hashicorp.com/terraform/language/backend/kubernetes)
          azurerm:
            type: object
            additionalProperties: true
            description: AzureRM backend configuration (https://developer.hashicorp.com/terraform/language/backend/azurerm)
        description: Terraform backend configuration
    additionalProperties: true
    description: Terraform execution and backend overrides

  # Demo mode
  demo:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
        description: Enable demo resources
      resources:
        type: object
        properties:
          database:
            type: boolean
            default: true
            description: Enable demo database cluster
          static:
            type: boolean
            default: false
            description: Enable static website demo
          bookinfo:
            type: boolean
            default: false
            description: Enable Istio bookinfo demo application
        additionalProperties: false
    additionalProperties: false

  # Timezone
  timezone:
    type: string
    anyOf:
      - enum:
          - utc
          - browser
      - pattern: '^[A-Z][A-Za-z_]*(/[A-Za-z_+\-0-9]+)*$'
    default: utc
    description: Default timezone for Grafana dashboards. `utc` or `browser` (Grafana magic values), or an IANA zone (e.g. `America/New_York`, `Etc/GMT+5`).

  # Time format
  time_format:
    type: string
    enum:
      - 12h
      - 24h
    default: 24h
    description: Time format for Grafana dashboards (12h or 24h)

  # Log level
  log_level:
    type: string
    enum:
      - trace
      - debug
      - info
      - warn
      - error
    default: info
    description: Minimum log level to retain (logs below this level are dropped)

  # Telemetry configuration
  telemetry:
    type: object
    properties:
      metrics:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: >
              Deploy the metrics pipeline (Prometheus operator, kube-prometheus-stack, metrics-server)
              and all per-component ServiceMonitors. Disable on resource-constrained clusters that
              don't need in-cluster metrics. Force-on when addons.observability.enabled is true,
              since the observability addon requires Prometheus to scrape.
        additionalProperties: false
      logs:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: >
              Deploy the logs pipeline (fluent-bit per-node shipper + fluentd aggregator). Disable
              on resource-constrained clusters. Force-on when addons.observability.enabled is true,
              since the observability addon's log sinks need the fluent-bit/fluentd path.
          driver:
            type: string
            enum:
              - fluentd
              - none
            default: fluentd
            description: Log aggregation driver for FluentBit output (fluentd is default, none keeps the per-node shipper but drops the central aggregator)
        additionalProperties: false
      alerts:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: >
              Deploy PrometheusRule alerting rules for core cluster components. Requires
              telemetry.metrics.enabled.
          grafana_url:
            type: string
            description: Base URL for the Grafana links in alert notifications, no trailing slash. Overrides the derived https://grafana.<domain>.
          slack:
            type: object
            properties:
              webhook_url:
                type: string
                sensitive: true
                description: Slack incoming webhook URL. Set via a secret() reference; windsor materializes it into the alertmanager-notification-slack Secret. Providing it enables Slack routing.
              channel:
                type: string
                default: "#alerts"
                description: Slack channel to post to.
              severity:
                type: array
                default: [warning, critical]
                minItems: 1
                items:
                  type: string
                  enum: [warning, critical]
                description: Alert severities routed to Slack.
            additionalProperties: false
            description: Route alerts to Slack. Set webhook_url (sensitive) to the incoming webhook.
        additionalProperties: false
    additionalProperties: false

  policies:
    type: object
    description: Policy configuration
    properties:
      enabled:
        type: boolean
        default: true
        description: >
          Deploy the Kyverno admission controller and cluster policies. Set to false to skip both
          policy-base and policy-resources entirely — useful for single-node or resource-constrained
          clusters. Individual policies (require_image_digest, resource_limits_requests) can be
          disabled separately via their own fields.
      reporting:
        type: string
        enum:
          - enabled
          - disabled
        default: disabled
        description: Run Kyverno's reports-controller to emit PolicyReport / ClusterPolicyReport resources (background audit scans). Admission enforcement is unaffected when this is disabled.
      cleanup:
        type: string
        enum:
          - enabled
          - disabled
        default: disabled
        description: Run Kyverno's cleanup-controller to execute CleanupPolicy / ClusterCleanupPolicy resources on a cron. Windsor ships no CleanupPolicy resources by default, so this is off unless you provide your own.
      require_image_digest:
        type: string
        enum:
          - enabled
          - disabled
        default: enabled
        description: Enable or disable the require-image-digest policy
      resource_limits_requests:
        type: string
        enum:
          - enabled
          - disabled
        default: enabled
        description: Enable or disable the resource limits/requests policy
    additionalProperties: false

  docker:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
        description: "[DEPRECATED] Unused. Local dev is via terraform compute/workstation only."
      registries:
        type: object
        propertyNames:
          $ref: '#/$defs/dnsHostname'
        additionalProperties:
          type: object
          properties:
            remote:
              $ref: '#/$defs/httpUrl'
              description: Upstream registry URL (e.g. https://gcr.io). http or https URL.
            local:
              $ref: '#/$defs/dnsHostname'
              description: Client-facing registry host for mirror key (e.g. docker.io). Omit to use the registry map key. Lowercase DNS-labels separated by dots.
            hostname:
              $ref: '#/$defs/dnsHostname'
              description: Hostname for the mirror endpoint (e.g. registry.test). Lowercase DNS-labels separated by dots.
          additionalProperties: false
        description: Registry mirror config keyed by registry host (e.g. gcr.io, ghcr.io). Used by workstation proxy/DNS and by Talos cluster mirrors. Keys are DNS hostnames.
    additionalProperties: false

  # Cluster topology preset — selects between a single-node cluster, a
  # multi-node cluster without HA guarantees, and a fully HA cluster
  # (3+ control planes, multi-replica components, PDBs, anti-affinity).
  # The precise node/pool layout is defined by the blueprint; this knob
  # just picks which cross-cutting HA components get layered in.
  topology:
    type: string
    enum:
      - single-node
      - multi-node
      - ha
    description: Cluster topology preset (single-node, multi-node, or ha).

  # Network configuration (used by terraform templates)
  network:
    type: object
    properties:
      cidr_block:
        type: string
        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
        default: "10.5.0.0/16"
        description: >
          Cluster network CIDR. Windsor either creates this network
          (cloud VPCs, incus bridges, docker bridges, hyperv NodePort
          NetNat) or attaches to an existing one at this address (metal,
          hyperv with net_adapter). Override when the default conflicts
          with existing routes on the host.
      gateway:
        type: string
        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$"
        description: >
          IPv4 default-route gateway for the cluster network. Required for
          platforms that deliver static network config to the guest (Hyper-V
          via CIDATA; future libvirt/proxmox). Defaults to cidrhost(cidr_block, 1)
          — correct for the common case where the gateway is the first usable
          host in the subnet, set explicitly when it isn't (e.g. /22 LANs where
          the router doesn't sit at .0.1).
      nameservers:
        type: array
        items:
          type: string
          pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$"
        default:
          - "1.1.1.1"
          - "8.8.8.8"
        description: DNS resolvers seeded into guest network config. Same delivery path as gateway (CIDATA on hyperv, etc.).
      loadbalancer_ips:
        type: object
        properties:
          start:
            $ref: '#/$defs/ipv4'
            description: Load balancer IP pool start (IPv4 dotted-quad; each octet 0-255).
          end:
            $ref: '#/$defs/ipv4'
            description: Load balancer IP pool end (IPv4 dotted-quad; each octet 0-255).
        additionalProperties: false
      loadbalancer_driver:
        type: string
        enum:
          - metallb
          - kube-vip
        description: In-cluster load balancer driver
      loadbalancer_mode:
        type: string
        enum:
          - arp
        description: Load balancer mode (only 'arp' is currently supported; use for flat L2 networks with ARP broadcasts)
    additionalProperties: false

  # Cluster configuration
  cluster:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster Terraform (and compute when platform is docker with workstation enabled)
      driver:
        type: string
        enum:
          - talos
          - aks
          - eks
        description: Cluster driver. Defaulted by platform-base based on the active platform (aws → eks, azure → aks, otherwise → talos); an explicit value here wins.
      endpoint:
        type: string
        pattern: '^https://[A-Za-z0-9.\-]+(:([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5]))?(/.*)?$'
        description: External controlplane API endpoint (https://host:port). IPv4 only — facets parse host:port with simple split on ':', and the hyperv NetNat backend is IPv4-only at the Windows API layer. Pattern enforces https scheme and an optional port in the 1-65535 TCP range; rejects URLs with whitespace, IPv6 brackets, or wrong scheme.
      controlplanes:
        type: object
        properties:
          <<: *nodePool
          count:
            type: integer
            minimum: 1
            default: 1
            description: Number of control plane nodes
          nodes:
            <<: *nodesSchema
            default:
              controlplane-1:
                endpoint: 10.5.0.1
                node: 10.5.0.1
                hostname: controlplane-1
            description: Named control plane node configurations
          schedulable:
            type: boolean
            default: false
            description: Allow scheduling workloads on control plane nodes (useful for single-node clusters or resource-constrained environments)
        additionalProperties: false
      workers:
        type: object
        properties:
          <<: *nodePool
          count:
            type: integer
            minimum: 0
            default: 0
            description: Number of worker nodes
          nodes:
            <<: *nodesSchema
            default:
              worker-1:
                endpoint: 10.5.0.2
                node: 10.5.0.2
                hostname: worker-1
            description: Named worker node configurations
          volumes:
            type: array
            items:
              $ref: '#/$defs/bindMountPath'
            default:
              - "/var/mnt/local"
            description: "Node directory paths for extra mounts. For directory-based storage include cluster.storage.local_base_path. Path or host:dest for local dev bind mounts. Block/device storage uses disks."
        additionalProperties: false
      # Node pools for elastic providers (aws, azure, gcp, omni). Map keyed by
      # user-chosen pool name. When set, takes precedence over cluster.workers
      # on elastic providers. Static-node providers (metal, docker, incus)
      # continue to use cluster.workers.
      pools:
        type: object
        propertyNames:
          $ref: '#/$defs/dnsLabel'
        additionalProperties:
          type: object
          required:
            - class
            - count
          properties:
            class:
              type: string
              enum:
                - system
                - general
                - compute
                - memory
                - storage
                - gpu
                - arm64
              description: Portable pool class. Maps to a per-provider instance family and emits a windsor.io/pool-class label so workloads target pools uniformly across clouds.
            count:
              type: integer
              minimum: 0
              description: Pool size. The fixed node count when autoscaling is off; when on, it seeds the default min/max bounds.
            autoscaling:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: Turn autoscaling on or off; overrides the class default.
                min:
                  type: integer
                  minimum: 0
                  description: Minimum node count when autoscaling is on. Defaults to 1.
                max:
                  type: integer
                  minimum: 1
                  description: Maximum node count when autoscaling is on. Defaults to 3 (or count, if larger).
              additionalProperties: false
              description: Per-pool autoscaling. Defaults on (min 1, max 3) for every class except system, which is fixed.
            lifecycle:
              type: string
              enum:
                - on-demand
                - spot
              default: on-demand
              description: Capacity type. spot uses interruptible instances.
            instance_types:
              type: array
              items:
                type: string
              description: Provider-locked instance type list. Pinning a single type is an anti-pattern (capacity shortages take the pool down); prefer multi-type lists. Falls back to the class default when unset.
            root_disk_size:
              type: integer
              minimum: 1
              description: EBS root volume size in GB. Defaults to the provider module default (64 GB on EKS).
            labels:
              type: object
              propertyNames:
                $ref: '#/$defs/k8sLabelKey'
              additionalProperties:
                $ref: '#/$defs/k8sLabelValue'
              description: Kubernetes labels applied to nodes in this pool, on top of the auto-injected windsor.io/pool=<name> and windsor.io/pool-class=<class>. Keys and values follow the k8s label spec.
            taints:
              type: array
              items:
                type: object
                required:
                  - key
                  - effect
                properties:
                  key:
                    $ref: '#/$defs/k8sLabelKey'
                  value:
                    $ref: '#/$defs/k8sLabelValue'
                  effect:
                    type: string
                    enum:
                      - NoSchedule
                      - PreferNoSchedule
                      - NoExecute
                additionalProperties: false
              description: Kubernetes taints applied to nodes in this pool.
          additionalProperties: false
        description: Node pool definitions, keyed by pool name. Each pool requires a class and a count.
      storage:
        type: object
        properties:
          single_storage_type:
            type: string
            description: Default storage driver. Directory-based (local_base_path), cloud default, or block (cluster.*.disks).
          local_base_path:
            $ref: '#/$defs/posixPath'
            default: "/var/mnt/local"
            description: Base path for directory-based storage. POSIX absolute path. Must be in the volumes list of every pool that can schedule pods using this storage (controlplanes.volumes when schedulable, workers.volumes).
          driver:
            type: string
            enum:
              - openebs
              - longhorn
            description: CSI storage driver. openebs for directory-based local storage; longhorn for block device storage (requires a dedicated disk, mandatory on Talos). Defaults to longhorn on incus, openebs elsewhere.
        additionalProperties: false
      cni:
        type: object
        properties:
          driver:
            type: string
            enum:
              - flannel
              - cilium
            description: >
              CNI driver. flannel is the Talos built-in default and requires no extra bootstrap.
              cilium bootstraps Cilium via terraform/cni/cilium before Flux starts (disables
              flannel and kube-proxy in Talos machine config) and manages it via Flux GitOps.
        additionalProperties: false
    additionalProperties: false

  # Operator contact
  email:
    type: string
    format: email
    description: >
      Primary operator email for the deployment. Used as the contact
      address for things like ACME (Let's Encrypt) account registration
      and may be reused by other contact-aware integrations (alerting,
      certificate expiry notices, etc.). Required when public TLS is
      active (e.g. AWS + dns.public_domain).

  # DNS configuration
  dns:
    type: object
    properties:
      domain:
        $ref: '#/$defs/dnsHostname'
        description: Base domain; used as fallback when public_domain or private_domain are not set. Lowercase DNS labels separated by dots (RFC 1123); no scheme, port, or trailing dot.
      public_domain:
        $ref: '#/$defs/dnsHostname'
        description: >
          Publicly-routable DNS zone for the deployment. On AWS, setting
          this provisions a public Route53 hosted zone in the same
          account, the cert-manager IAM role + Pod Identity binding for
          DNS-01 challenges, and an ACME ClusterIssuer that issues real
          Let's Encrypt certificates for the gateway. The operator must
          delegate this domain at their registrar to the name servers
          the dns-zone module outputs. Leave unset for selfsigned-only
          (just-works) mode. Lowercase DNS labels separated by dots; no
          scheme, port, or trailing dot.
      private_domain:
        $ref: '#/$defs/dnsHostname'
        description: Private DNS zone (e.g. in-cluster CoreDNS, workstation resolver). Lowercase DNS labels separated by dots.
    additionalProperties: false

  # GitOps configuration
  gitops:
    type: object
    properties:
      mode:
        type: string
        enum:
          - pull
          - push
        default: push
        description: |
          GitOps reconciliation mode.
          push — a Flux Receiver is emitted so webhook POSTs trigger immediate reconciliation; intervals act as a safety-net poll only (default).
          pull — Flux polls the GitRepository on its configured interval; no Receiver is emitted.
      repository:
        type: object
        properties:
          name:
            $ref: '#/$defs/dnsLabel'
            default: local
            description: Flux GitRepository name used as the primary source for reconciliations.
        additionalProperties: false
      webhook:
        type: object
        properties:
          token:
            type: string
            sensitive: true
            description: Token for the Flux Receiver secret (push mode only). Defaults to a placeholder in workstation mode; set explicitly for production.
        additionalProperties: false
      web_ui:
        type: boolean
        default: false
        description: Expose the flux-operator web UI through the gateway at flux.<domain>. The UI is unauthenticated, so only enable it behind a trusted or private gateway. Off by default; always reachable via port-forward regardless.
    additionalProperties: false

  # Gateway configuration
  gateway:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster traffic entrypoint
      driver:
        type: string
        enum:
          - envoy
          - cilium
        description: Gateway driver
      service_type:
        type: string
        enum:
          - LoadBalancer
          - NodePort
        description: Kubernetes Service type used to expose the gateway. When unset, defaults to LoadBalancer except on docker-desktop, which is forced to NodePort. Set to NodePort to expose the gateway on any driver without a cluster LB (e.g. single-node Talos VMs).
      access:
        type: string
        enum:
          - public
          - private
        description: Whether the gateway is reachable from the public internet (public, default) or only from inside the VPC/network (private). Flipping this to `private` cascades through the gateway's adjacent infrastructure — load balancer scheme, the DNS zone external-dns publishes to, and the cert-manager issuer — so the whole gateway stack stays coherent. Requires `dns.private_domain` to be set; otherwise the private path is a no-op and the gateway runs as public.
      publish_ports:
        type: object
        propertyNames:
          pattern: '^([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$'
        additionalProperties:
          type: integer
          minimum: 1
          maximum: 65535
        description: Map of bench-side listen port to in-cluster NodePort, used by host-level forwarders (e.g. hyperv portproxy + firewall) to expose the gateway on a "real" port like 80/443 from the host machine while the cluster keeps NodePort allocations in the 30000-32767 range. Keyed by the host listen port (e.g. 80), value is the cluster NodePort (e.g. 30080). Keys and values are both bounded to the 1-65535 TCP port range.
    additionalProperties: false

  # Ingress configuration
  ingress:
    type: object
    deprecated: true
    description: Deprecated. Prefer gateway.enabled and gateway.driver.
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster traffic entrypoint
      driver:
        type: string
        enum:
          - nginx
          - envoy
          - envoy-gateway
        description: Legacy gateway driver
    additionalProperties: false

  # VM configuration
  # Deprecated: use workstation.runtime and workstation.enabled instead. vm.driver is still used as fallback when workstation.runtime is unset.
  vm:
    type: object
    deprecated: true
    description: Deprecated. Prefer workstation.runtime (and workstation.enabled). vm.driver remains as fallback for effective runtime when option-workstation is not applied.
    properties:
      driver:
        type: string
        enum:
          - ""
          - docker-desktop
          - colima
        default: ""
        description: VM driver for local clusters (empty = not colima)
      runtime:
        type: string
        enum:
          - docker
          - incus
        description: Container/VM runtime
      address:
        type: string
        description: Deprecated. Use workstation.address. VM/workstation host address (e.g. Colima VM IP).
    additionalProperties: false

  # Workstation (DNS, registries, git livereload)
  workstation:
    type: object
    properties:
      enabled:
        type: boolean
        deprecated: true
        default: false
        description: Deprecated. No facet reads this field. `workstation.runtime` is the actual switch that turns on the workstation stack (DNS, registries, git livereload, cluster compute); leave runtime unset to opt out.
      arch:
        type: string
        enum:
          - amd64
          - arm64
        default: amd64
        description: CPU architecture for Incus Talos images (host arch when workstation enabled; target arch for server deployments). Used by talos.incus_image.
      address:
        type: string
        anyOf:
          - $ref: '#/$defs/ipv4'
          - $ref: '#/$defs/dnsHostname'
        description: Address of the workstation, used for SSH to configure workstation networking. IPv4 dotted-quad or DNS-labelled hostname.
      runtime:
        type: string
        enum:
          - colima
          - docker-desktop
          - docker
        description: Host runtime for local clusters. VM-backed (colima, docker-desktop) or plain engine (docker). When unset, falls back to vm.driver.
      dns:
        type: object
        description: Workstation-specific DNS state (server address, forwarders)
        properties:
          address:
            type: string
            anyOf:
              - $ref: '#/$defs/ipv4'
              - $ref: '#/$defs/dnsHostname'
            description: DNS server address resolved from workstation infrastructure. IPv4 dotted-quad or DNS-labelled hostname.
          forward:
            type: array
            items:
              type: string
              anyOf:
                - $ref: '#/$defs/ipv4'
                - $ref: '#/$defs/dnsHostname'
            description: Forward DNS servers. IPv4 dotted-quad or DNS-labelled hostname per entry.
        additionalProperties: false
      services:
        type: object
        properties:
          dns:
            type: boolean
            default: true
            description: Create the DNS (CoreDNS) container
          git:
            type: boolean
            default: true
            description: Create the git livereload container
          registries:
            type: boolean
            default: true
            description: Create registry proxy containers (from docker.registries when true)
        additionalProperties: false
        description: Toggle workstation services
      git:
        type: object
        properties:
          username:
            type: string
            default: local
            description: Username for git livereload HTTP auth
          password:
            type: string
            default: local
            description: Password for git livereload HTTP auth
          livereload:
            type: boolean
            default: false
            description: When true, git-livereload posts to the Flux webhook on push. Requires gitops.mode=push on the cluster side.
        additionalProperties: false
        description: Git livereload credentials and push-mode toggle
    additionalProperties: false

  # Optional addons
  addons:
    type: object
    properties:
      private_ca:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable private certificate authority with trust-manager
        additionalProperties: false
      private_dns:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable self-hosted CoreDNS for private DNS zones
        additionalProperties: false
      observability:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable observability stack
          metrics_backend:
            type: string
            enum:
              - prometheus
            default: prometheus
            description: Metrics backend (prometheus is default and included in base telemetry)
          dashboards:
            type: string
            enum:
              - grafana
            default: grafana
            description: Dashboards provider (grafana for self-hosted Grafana)
          logs_driver:
            type: string
            enum:
              - stdout
              - quickwit
              - elasticsearch
            default: quickwit
            description: Log storage driver (stdout for console output, quickwit for local storage, elasticsearch for ELK stack)
          admin_password:
            type: string
            description: Grafana admin password
        additionalProperties: false
      object_store:
        type: object
        properties:
          enabled:
            type: boolean
            default: false
            description: Enable object storage service
          driver:
            type: string
            enum:
              - minio
            default: minio
            description: Object storage driver
        additionalProperties: false
      database:
        type: object
        properties:
          postgres:
            type: object
            properties:
              enabled:
                type: boolean
                description: Enable PostgreSQL database service
              driver:
                type: string
                enum:
                  - cloudnativepg
                default: cloudnativepg
                description: PostgreSQL database driver
            additionalProperties: false
        additionalProperties: false
    additionalProperties: false

required: []
additionalProperties: false

# Cross-field constraints. JSON Schema's if/then lets us require fields
# only when other fields are set, surfacing config gaps at validation
# time instead of at terraform/cluster apply time.
#
allOf:
  # Managed-cluster drivers ↔ platform coherence. cluster.driver: eks
  # binds to AWS EKS (Route53, AWS provider, EKS control plane); aks
  # binds to Azure AKS. They only make sense on the matching platform,
  # and the platform-base facet would otherwise inject the right driver
  # automatically. An explicit mismatch (e.g. platform: metal +
  # cluster.driver: eks) silently binds the wrong cloud and fails apply.
  - if:
      properties:
        cluster:
          type: object
          properties:
            driver:
              const: eks
          required:
            - driver
      required:
        - cluster
    then:
      properties:
        platform:
          const: aws
      required:
        - platform

  - if:
      properties:
        cluster:
          type: object
          properties:
            driver:
              const: aks
          required:
            - driver
      required:
        - cluster
    then:
      properties:
        platform:
          const: azure
      required:
        - platform

  # cluster.storage.driver is Talos-only (config-talos.yaml reads it; managed
  # clusters use cluster.storage.single_storage_type). Fires only when
  # cluster.driver is explicit, so platform-derived defaults aren't blocked.
  - if:
      properties:
        cluster:
          type: object
          properties:
            storage:
              type: object
              required:
                - driver
            driver:
              type: string
          required:
            - storage
            - driver
      required:
        - cluster
    then:
      properties:
        cluster:
          properties:
            driver:
              const: talos
