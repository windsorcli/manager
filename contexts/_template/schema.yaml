$schema: https://json-schema.org/draft/2020-12/schema
title: Windsor Manager Blueprint Configuration Schema
description: Manager-specific configuration, merged with the schema Core contributes through the core source.
type: object

# Core's schema arrives with the `core` source and merges into this one, so every
# platform, cluster, network, and addons key Core defines is already available in a
# Manager context without being restated here. This file carries only what Manager
# itself adds.
#
# Rules that matter when adding keys, from the merge in
# pkg/runtime/config/schema_merge.go:
#
#   - Fragments deep-merge and `properties` union recursively, but only where both
#     sides declare `type: object`. Adding a new sibling under an existing Core
#     block — a new entry under `addons`, say — merges cleanly and still satisfies
#     Core's `additionalProperties: false`.
#
#   - Do not redeclare a key Core owns. Fragment load order is not something to
#     rely on: sources load in parallel goroutines, Core lands in a later round
#     during normal composition but earlier under `windsor init --blueprint`. A
#     conflicting declaration is resolved by whichever fragment happens to land
#     last, and losing is silent rather than an error. To change a Core default,
#     enum, or description, change it in Core.
#
#   - Do not define `$defs`. Unlike `properties`, `$defs` is replaced wholesale
#     rather than merged, so one side's definitions supplant the other's and any
#     `$ref` pointing at the losing set dangles. Reference Core's instead
#     (`$ref: '#/$defs/dnsHostname'` and friends) or inline the constraint.
#
#   - Watch for names Core already uses in another sense. Core's `secrets` block is
#     the set of providers backing build-time `secret()` references, not an
#     in-cluster secrets backend; a management-side store needs its own key rather
#     than an extra property there.

properties: {}
