# S3-backed storage. Replaces the filesystem root with a bucket from the platform's
# object store; credentials come from the registry-s3 Secret the facet materializes.
- op: replace
  path: /spec/template/spec/containers/0/env/2
  value:
    name: REGISTRY_STORAGE
    value: s3
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: REGISTRY_STORAGE_S3_BUCKET
    value: ${registry_bucket}
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: REGISTRY_STORAGE_S3_REGION
    value: ${registry_region}
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: REGISTRY_STORAGE_S3_REGIONENDPOINT
    value: ${registry_endpoint}
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: REGISTRY_STORAGE_S3_ACCESSKEY
    valueFrom:
      secretKeyRef:
        name: registry-s3
        key: access_key
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: REGISTRY_STORAGE_S3_SECRETKEY
    valueFrom:
      secretKeyRef:
        name: registry-s3
        key: secret_key
